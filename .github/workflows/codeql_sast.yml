name: CodeQL CI Pipeline

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write
  
jobs:
  SAST:
    name: CodeQL Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write   # required to upload results to the Security tab
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'     # change to match your project (18, 20, 22, etc.)
          cache: 'npm'           # use 'yarn' or 'pnpm' if applicable

      - name: Install dependencies
        run: npm ci              # use 'yarn install --frozen-lockfile' or 'pnpm install --frozen-lockfile' if applicable

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended

      # Autobuild is optional for JS/TS — CodeQL can analyze without a build step.
      # Keep it only if your project has a build (TypeScript compilation, bundler, etc.)
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
