# ==========================================
# PROJECT IDENTITY
# ==========================================
sonar.projectKey=your_org_your_project
sonar.organization=your_sonarcloud_org
sonar.projectName=My JavaScript Project
sonar.projectVersion=1.0

# ==========================================
# SOURCE CONFIGURATION
# ==========================================
sonar.sources=src
sonar.tests=src
sonar.sourceEncoding=UTF-8

# ==========================================
# TEST FILE PATTERNS
# ==========================================
sonar.test.inclusions=\
  **/*.test.js, \
  **/*.test.jsx, \
  **/*.test.ts, \
  **/*.test.tsx, \
  **/*.spec.js, \
  **/*.spec.jsx, \
  **/*.spec.ts, \
  **/*.spec.tsx

# ==========================================
# COVERAGE REPORTS (LCOV — Jest / Vitest)
# ==========================================
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ==========================================
# TYPESCRIPT SPECIFIC (remove if plain JS)
# ==========================================
sonar.typescript.tsconfigPath=tsconfig.json

# ==========================================
# EXCLUSIONS
# ==========================================
sonar.exclusions=\
  **/node_modules/**, \
  **/dist/**, \
  **/build/**, \
  **/coverage/**, \
  **/*.min.js, \
  **/*.config.js, \
  **/*.config.ts, \
  **/public/**

sonar.coverage.exclusions=\
  **/*.config.js, \
  **/*.config.ts, \
  **/index.js, \
  **/index.ts, \
  **/*.stories.tsx, \
  **/*.stories.jsx, \
  **/mocks/**, \
  **/types/**

sonar.test.exclusions=\
  **/node_modules/**, \
  **/dist/**
