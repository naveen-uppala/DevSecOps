# ==========================================
# PROJECT IDENTITY
# ==========================================
sonar.projectKey=your_org_my-repo
sonar.organization=your_sonarcloud_org
sonar.projectName=my-repo
sonar.projectVersion=1.0.0

# ==========================================
# SOURCE CONFIGURATION
# React source → src/
# Express source → server/ (excluding build/)
# ==========================================
sonar.sources=src,server
sonar.tests=src
sonar.sourceEncoding=UTF-8

# ==========================================
# TEST FILE PATTERNS
# ==========================================
sonar.test.inclusions=\
  **/*.test.js, \
  **/*.test.jsx, \
  **/*.spec.js, \
  **/*.spec.jsx

# ==========================================
# COVERAGE REPORTS (React)
# ==========================================
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ==========================================
# EXCLUSIONS
# server/build/ must be excluded —
# it's generated React code, not source
# ==========================================
sonar.exclusions=\
  **/node_modules/**, \
  **/coverage/**, \
  **/public/**, \
  **/*.min.js, \
  server/build/**

sonar.coverage.exclusions=\
  **/reportWebVitals.js, \
  **/setupTests.js, \
  **/index.js, \
  **/*.config.js, \
  **/App.js, \
  server/**

sonar.test.exclusions=\
  **/node_modules/**, \
  server/build/**
